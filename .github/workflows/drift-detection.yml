name: Drift Detection

on:
  schedule:
    - cron: "0 2 * * *"   # nightly at 02:00 UTC
  workflow_dispatch:        # allow manual runs

permissions:
  contents: read
  issues: write

env:
  TF_VERSION: "1.6.0"

jobs:
  detect-drift:
    name: Detect Drift - ${{ matrix.environment }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, prod]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="key=m5-03-gitops/${{ matrix.environment }}/terraform.tfstate"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform Plan (drift check)
        id: plan
        run: |
          terraform plan \
            -var-file=environments/${{ matrix.environment }}/terraform.tfvars \
            -input=false \
            -no-color \
            -detailed-exitcode 2>&1 | tee plan_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        continue-on-error: true

      - name: Alert on drift
        if: steps.plan.outputs.exit_code == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('plan_output.txt', 'utf8');
            const truncated = planOutput.length > 60000
              ? planOutput.substring(0, 60000) + "\n\n... (truncated)"
              : planOutput;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[DRIFT] Infrastructure drift detected in ${{ matrix.environment }}`,
              body: `## Drift Detected in \`${{ matrix.environment }}\`

            The nightly drift check found differences between the Terraform state and actual AWS infrastructure.
            Someone may have modified resources outside of Terraform.

            ### Plan Output
            \`\`\`
            ${truncated}
            \`\`\`

            **Action required:** Review the changes above and either:
            - Run \`terraform apply\` to reconcile, or
            - Import/remove the out-of-band resources

            *Detected at: ${{ github.run_id }}*`,
              labels: ['drift', 'infrastructure', 'alert']
            });

      - name: No drift found
        if: steps.plan.outputs.exit_code == '0'
        run: echo "No drift detected in ${{ matrix.environment }} - infrastructure matches state."
